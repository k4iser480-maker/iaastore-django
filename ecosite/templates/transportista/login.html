{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-conten padding-y" style="min-height:84vh">
<div class="card mx-auto" style="max-width: 380px; margin-top:100px;">
      <div class="card-body">
      <h4 class="card-title mb-4">Ingreso Transportistas</h4>
      {% include 'includes/alerts.html' %}
      <form action="{% url 'transportista_login' %}" method="POST">
          {% csrf_token %}
          <div class="form-group">
             <input type="email" class="form-control" placeholder="Correo Electrónico" name="username" required>
          </div> 
          <div class="form-group">
            <div class="input-group">
                <input type="password" class="form-control" placeholder="Contraseña" name="password" id="transportista_password" required>
                <div class="input-group-append">
                    <span class="input-group-text toggle-password" data-target="#transportista_password" style="cursor: pointer;">
                        <i class="fa fa-eye" style="color: #6c757d;"></i>
                    </span>
                </div>
            </div>
          </div>
          
          <div class="form-group">
              <button type="submit" class="btn btn-primary btn-block"> Iniciar Sesión  </button>
          </div>
      </form>
      </div> 
    </div> 
</section>
{% endblock %}
