{% extends 'base.html' %}

{% block content %}
<section class="section-conten padding-y" style="min-height:84vh">

<!-- ============================ COMPONENT LOGIN   ================================= -->
	<div class="card mx-auto" style="max-width: 380px; margin-top:100px;">
      <div class="card-body">
      <h4 class="card-title mb-4">Restablecer Contraseña</h4>
      {% include 'includes/alerts.html' %}
      <form action="{% url 'resetPassword' %}" method="POST">
        {% csrf_token %}
          <div class="form-group">
            <div class="input-group">
			    <input type="password" class="form-control" placeholder="Crear Contraseña" name="password" id="password">
                <div class="input-group-append">
                    <span class="input-group-text toggle-password" data-target="#password" style="cursor: pointer;">
                        <i class="fa fa-eye" style="color: #6c757d;"></i>
                    </span>
                </div>
            </div>
          </div>
          <div class="form-group">
            <div class="input-group">
			    <input type="password" class="form-control" placeholder="Confirmar Contraseña" name="confirm_password" id="confirm_password">
                <div class="input-group-append">
                    <span class="input-group-text toggle-password" data-target="#confirm_password" style="cursor: pointer;">
                        <i class="fa fa-eye" style="color: #6c757d;"></i>
                    </span>
                </div>
            </div>
          </div>
          
         
          <div class="form-group">
              <button type="submit" class="btn btn-primary btn-block"> Restablecer </button>
          </div> <!-- form-group// -->    
      </form>
      </div> <!-- card-body.// -->
    </div> <!-- card .// -->

     <p class="text-center mt-4">¿No tienes una cuenta? <a href="{% url 'register' %}">Regístrate</a></p>
     <br><br>
<!-- ============================ COMPONENT LOGIN  END.// ================================= -->


</section>
{% endblock %}
